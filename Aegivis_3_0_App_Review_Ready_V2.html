<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegivis 3.0 | Ultimate Control Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #020408;
            color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .phone-frame {
            width: 100%;
            max-width: 410px;
            height: 840px;
            background: #0f172a;
            border-radius: 3.5rem;
            border: 10px solid #1e293b;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <h1 class="text-white p-10">Restored Version V2</h1>
        <p class="text-slate-400 px-10">This file is being synced with index.html (Reverted Version).</p>
        <script>window.location.href = "index.html";</script>
    </div>
</body>
</html>
